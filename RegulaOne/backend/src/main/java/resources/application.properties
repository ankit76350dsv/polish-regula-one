spring.application.name=backend
spring.profiles.active=dev

# CORS — comma-separated list of allowed frontend origins.
# Override in profile-specific properties (e.g. application-prod.properties).
cors.allowed-origins=http://localhost:3000

# AWS Cognito — override in profile-specific properties or via env vars
aws.cognito.region=${COGNITO_REGION:ap-southeast-2}
aws.cognito.user-pool-id=${COGNITO_USER_POOL_ID:}
aws.cognito.client-id=${COGNITO_CLIENT_ID:}
aws.cognito.client-secret=${COGNITO_CLIENT_SECRET:}

